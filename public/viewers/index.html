<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Unifier - Viewer Counter</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            color: white;
            overflow: hidden;
        }
        #viewers-container {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 900;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: fit-content;
            backdrop-filter: blur(8px);
        }

        .layout-vertical {
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        /* Layout Grid */
        .layout-grid {
            display: grid !important;
            grid-template-columns: repeat(2, auto);
            gap: 16px 32px;
            align-items: center;
        }

        .layout-grid .total-stat {
            grid-column: span 2;
            justify-content: center;
        }

        /* Layout Minimalista */
        .layout-minimalist {
            gap: 12px;
            padding: 8px 16px;
        }
        .layout-minimalist .icon {
            display: none !important;
        }

        .platform-stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon {
            object-fit: contain;
        }

        .total-stat {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 20px;
            border-left: 2px solid rgba(255,255,255,0.1);
        }

        .layout-vertical .total-stat, .layout-grid .total-stat {
            border-left: none !important;
            border-top: 2px solid rgba(255,255,255,0.1);
            padding-left: 0 !important;
            padding-top: 10px !important;
            width: 100%;
        }

        .label {
            text-transform: uppercase;
            opacity: 0.5;
            letter-spacing: 0.1em;
            font-weight: 800;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div id="viewers-container">
        <!-- JS Preenche -->
    </div>

    <script>
        const socket = io();
        const container = document.getElementById('viewers-container');
        
        const icons = {
            twitch: 'https://cdn-icons-png.flaticon.com/512/5968/5968819.png',
            youtube: 'https://cdn-icons-png.flaticon.com/512/1384/1384060.png',
            shorts: 'https://cdn.simpleicons.org/youtubeshorts/FF0000',
            kick: 'https://cdn.simpleicons.org/kick/53FC18',
            tiktok: 'https://cdn-icons-png.flaticon.com/512/3046/3046121.png'
        };

        let currentConfig = {
            bgColor: '#000000', bgOpacity: 85, fontColor: '#ffffff', fontSize: 18, showTotal: true
        };
        let currentData = { counts: {}, total: 0 };

        socket.on('connect', () => {
            console.log('Conectado ao servidor de viewers');
            socket.emit('join-room', 'viewers');
            // Solicita dados imediatamente ao conectar/recarregar
            socket.emit('request-viewers-update');
            socket.emit('get-config');
        });

        socket.on('config-update', (config) => {
            if (config) {
                // Se receber o config completo, pega a parte de viewers, senão usa o que recebeu
                currentConfig = config.viewersConfig || config;
                render();
            }
        });

        socket.on('viewers-update', (data) => {
            currentData = data;
            render();
        });

        function formatCount(val) {
            const n = parseInt(String(val).replace(/[^0-9]/g, ''));
            if (isNaN(n)) return val;
            return n.toLocaleString('pt-BR');
        }

        function render() {
            if (!currentData || !currentData.active) {
                container.innerHTML = '';
                container.style.background = 'transparent';
                return;
            }
            
            if (!currentData.counts || Object.keys(currentData.counts).length === 0) {
                container.innerHTML = ''; // Nada enquanto carrega
                return;
            }

            // Aplicar estilos
            const bgColor = currentConfig.bgColor || '#111111';
            const fontColor = currentConfig.fontColor || '#ffffff';
            const br = parseInt(bgColor.slice(1, 3), 16) || 0;
            const bg = parseInt(bgColor.slice(3, 5), 16) || 0;
            const bb = parseInt(bgColor.slice(5, 7), 16) || 0;
            const opacity = (currentConfig.bgOpacity !== undefined ? currentConfig.bgOpacity : 85) / 100;
            
            container.style.background = `rgba(${br}, ${bg}, ${bb}, ${opacity})`;
            container.style.color = fontColor;
            
            // Aplicar Layout
            const layout = currentConfig.layout || 'default';
            const spacing = currentConfig.spacing !== undefined ? currentConfig.spacing : 20;
            container.className = ''; // Limpa classes
            container.style.gap = `${spacing}px`;
            if (layout !== 'default') {
                container.classList.add(`layout-${layout}`);
            }

            // Filtro de Ícones
            const iconStyle = currentConfig.iconStyle || 'original';
            let iconFilter = '';
            if (iconStyle === 'white') iconFilter = 'filter: brightness(0) invert(1);';
            else if (iconStyle === 'black') iconFilter = 'filter: brightness(0);';

            let html = '';
            
            // Renderiza Plataformas
            const channels = currentConfig.channels || {};
            for (const [platform, count] of Object.entries(currentData.counts)) {
                if (!count && count !== 0 && count !== '0') continue;
                
                // Pula se estiver desativado nas configurações atuais
                if (channels[platform] && channels[platform].enabled === false) continue;
                
                // Ajuste de escala para ícones SimpleIcons (que não tem margem nativa) não ficarem gigantes comparados aos da Flaticon
                let extraStyle = '';
                if (platform === 'kick' || platform === 'shorts') {
                    extraStyle = 'transform: scale(0.8);';
                }
                
                html += `
                    <div class="platform-stat">
                        <img src="${icons[platform]}" class="icon" style="width: ${currentConfig.fontSize}px; height: ${currentConfig.fontSize}px; ${iconFilter} ${extraStyle}">
                        <span class="count" style="font-size: ${currentConfig.fontSize}px;">${formatCount(count)}</span>
                    </div>
                `;
            }

            // Renderiza Total
            if (currentData.total > 0 && currentConfig.showTotal && layout !== 'minimalist') {
                html += `
                    <div class="total-stat" style="border-color: ${currentConfig.fontColor}33;">
                        <span class="label" style="font-size: ${Math.max(10, currentConfig.fontSize * 0.55)}px;">Total</span>
                        <span class="count" style="font-size: ${currentConfig.fontSize}px;">${formatCount(currentData.total)}</span>
                    </div>
                `;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
