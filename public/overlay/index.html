<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriftChat Overlay</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="transparent layout-modern">
    <div id="chat-container"></div>
    <style id="custom-styles-container"></style>

    <script>
        const socket = io();
        const container = document.getElementById('chat-container');
        const customStyles = document.getElementById('custom-styles-container');

        // Detecta qual overlay é pela URL
        const isMonitor = window.location.pathname.includes('/monitor');
        const ROOM = isMonitor ? 'overlay2' : 'overlay1';

        // Entra na room correta
        socket.on('connect', () => {
            socket.emit('join-room', ROOM);
        });

        let messageQueue = [];
        let isProcessingQueue = false;

        socket.on('config-update', (data) => {
            console.log('Config recebida:', data);
            if (!data) return;

            // Troca Layout sem remover outras classes
            if (data.layout) {
                // Remove layouts antigos
                const currentLayouts = Array.from(document.body.classList).filter(c => c.startsWith('layout-'));
                currentLayouts.forEach(c => document.body.classList.remove(c));
                document.body.classList.add('layout-' + data.layout);
            }

            // CSS Customizado
            if (data.customCSS !== undefined) {
                customStyles.innerHTML = data.customCSS;
            }

            // Fundo (com fallback seguro)
            if (data.bgColor && data.bgOpacity !== undefined) {
                try {
                    const color = data.bgColor.startsWith('#') ? data.bgColor : '#000000';
                    const r = parseInt(color.slice(1, 3), 16) || 0;
                    const g = parseInt(color.slice(3, 5), 16) || 0;
                    const b = parseInt(color.slice(5, 7), 16) || 0;
                    const a = (data.bgOpacity || 0) / 100;
                    document.body.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a})`;
                } catch(e) { console.error('Erro no fundo:', e); }
            }

            // Cor do Card
            if (data.cardColor) {
                try {
                    const color = data.cardColor.startsWith('#') ? data.cardColor : '#1e293b';
                    const opacity = (data.cardOpacity !== undefined ? data.cardOpacity : 85) / 100;
                    const r = parseInt(color.slice(1, 3), 16) || 30;
                    const g = parseInt(color.slice(3, 5), 16) || 41;
                    const b = parseInt(color.slice(5, 7), 16) || 59;
                    document.documentElement.style.setProperty('--card-bg', `rgba(${r}, ${g}, ${b}, ${opacity})`);
                } catch(e) { console.error('Erro no card:', e); }
            }

            // Espaçamento e Borda
            if (data.messageSpacing !== undefined) {
                document.documentElement.style.setProperty('--msg-spacing', data.messageSpacing + 'px');
            }
            if (data.hideLeftBorder !== undefined) {
                document.body.classList.toggle('hide-borders', data.hideLeftBorder);
            }

            window.appConfig = data;
        });

        socket.on('chat-message', (msg) => {
            const config = window.appConfig || {};
            if (config.slowMode > 0) {
                messageQueue.push(msg);
                if (!isProcessingQueue) processQueue();
            } else {
                addMessage(msg);
            }
        });

        async function processQueue() {
            if (messageQueue.length === 0) {
                isProcessingQueue = false;
                return;
            }
            isProcessingQueue = true;
            const msg = messageQueue.shift();
            addMessage(msg);
            const config = window.appConfig || {};
            const delay = (config.slowMode || 0) * 1000;
            await new Promise(resolve => setTimeout(resolve, delay));
            processQueue();
        }

        function addMessage(data) {
            const config = window.appConfig || {};
            const animationClass = config.animation || 'slide';
            const showAvatar = config.showAvatars !== false;

            const div = document.createElement('div');
            div.className = `message-item ${animationClass}-in ${data.platform}`;

            const badgeUrl = getBadge(data.platform);
            const avatarHtml = showAvatar ?
                (data.avatar ?
                    `<img src="${data.avatar}" class="avatar" onerror="this.style.display='none'; this.nextSibling.style.display='flex'">` :
                    ''
                ) + `<div class="avatar-placeholder" style="background: ${data.color || '#444'}; display: ${data.avatar ? 'none' : 'flex'}">${(data.author || '?')[0].toUpperCase()}</div>`
                : '';

            div.innerHTML = `
                ${avatarHtml}
                <div class="message-content">
                    <div class="author-row">
                        <img src="${badgeUrl}" class="platform-badge">
                        <span class="author-name" style="color: ${data.color || '#fff'}">${data.author}</span>
                    </div>
                    <div class="text">${data.message}</div>
                </div>
            `;

            container.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
            if (container.children.length > 50) container.removeChild(container.firstChild);
        }

        function getBadge(platform) {
            const badges = {
                twitch: 'https://cdn-icons-png.flaticon.com/512/5968/5968819.png',
                youtube: 'https://cdn-icons-png.flaticon.com/512/1384/1384060.png',
                kick: 'https://kick.com/favicon.ico'
            };
            return badges[platform] || '';
        }
    </script>
</body>
</html>
